  <rect x="82" y="464" width="222" height="34" rx="8" fill="#16a34a"/>
  <text x="193" y="487" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">EQUIPMENT WALL</text>
  <rect x="670" y="464" width="100" height="34" rx="8" fill="#ef4444"/>
