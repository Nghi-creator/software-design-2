    <rect x="500" y="344" width="150" height="86" rx="14"/>
    <rect x="694" y="344" width="150" height="86" rx="14"/>
  </g>
  <g fill="#e0f2fe">
    <text x="187" y="253" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">PODS 1-2</text>
    <text x="381" y="253" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">PODS 3-4</text>
    <text x="575" y="253" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">PODS 5-6</text>
    <text x="769" y="253" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">PODS 7-8</text>
    <text x="187" y="393" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">PODS 9-10</text>
