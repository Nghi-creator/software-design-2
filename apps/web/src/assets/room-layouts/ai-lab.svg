<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">AI Lab room layout</title>
  <desc id="desc">Computer lab with instructor station, clustered worktables, equipment wall, and two exits.</desc>
  <rect width="960" height="560" fill="#111827"/>
  <rect x="36" y="36" width="888" height="488" rx="26" fill="#172033" stroke="#38bdf8" stroke-width="4"/>
  <rect x="94" y="76" width="286" height="72" rx="14" fill="#0369a1"/>
  <text x="237" y="121" fill="#ffffff" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle">INSTRUCTOR</text>
  <rect x="438" y="76" width="428" height="72" rx="14" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
  <text x="652" y="121" fill="#e0f2fe" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">SCREEN / MODEL DEMO</text>
  <g fill="#2563eb" stroke="#bfdbfe" stroke-width="2">
    <rect x="112" y="204" width="150" height="86" rx="14"/>
    <rect x="306" y="204" width="150" height="86" rx="14"/>
