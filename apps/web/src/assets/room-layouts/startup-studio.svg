<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Startup Studio room layout</title>
  <desc id="desc">Flexible workshop studio with pitch area, group tables, whiteboard wall, demo booth, and exits.</desc>
  <rect width="960" height="560" fill="#11131f"/>
  <rect x="38" y="38" width="884" height="484" rx="30" fill="#1b2033" stroke="#34d399" stroke-width="4"/>
  <rect x="94" y="76" width="324" height="86" rx="18" fill="#059669"/>
  <text x="256" y="128" fill="#ffffff" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle">PITCH AREA</text>
  <rect x="478" y="76" width="350" height="86" rx="18" fill="#0f172a" stroke="#6ee7b7" stroke-width="3"/>
  <text x="653" y="128" fill="#d1fae5" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle">WHITEBOARD WALL</text>
  <g fill="#f97316" stroke="#fed7aa" stroke-width="2">
    <rect x="116" y="216" width="174" height="88" rx="20"/>
    <rect x="394" y="216" width="174" height="88" rx="20"/>
    <rect x="672" y="216" width="174" height="88" rx="20"/>
