    <rect x="672" y="354" width="174" height="88" rx="20"/>
  </g>
  <g fill="#431407">
    <text x="203" y="267" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">TEAM TABLE A</text>
    <text x="481" y="267" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">TEAM TABLE B</text>
    <text x="759" y="267" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">TEAM TABLE C</text>
    <text x="203" y="405" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">TEAM TABLE D</text>
    <text x="481" y="405" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">TEAM TABLE E</text>
    <text x="759" y="405" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">TEAM TABLE F</text>
