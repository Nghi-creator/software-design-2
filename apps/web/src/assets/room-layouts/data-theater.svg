<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Data Theater room layout</title>
  <desc id="desc">Theater room with tiered seating arcs, analytics screen, control desk, aisles, and exits.</desc>
  <rect width="960" height="560" fill="#101828"/>
  <rect x="36" y="34" width="888" height="492" rx="30" fill="#1d2436" stroke="#f59e0b" stroke-width="4"/>
  <rect x="168" y="68" width="624" height="70" rx="16" fill="#b45309"/>
  <text x="480" y="113" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">DATA WALL / STAGE</text>
  <path d="M170 210 Q480 140 790 210" fill="none" stroke="#fbbf24" stroke-width="38" stroke-linecap="round"/>
  <path d="M140 286 Q480 196 820 286" fill="none" stroke="#fbbf24" stroke-width="38" stroke-linecap="round"/>
  <path d="M120 368 Q480 256 840 368" fill="none" stroke="#fbbf24" stroke-width="38" stroke-linecap="round"/>
  <path d="M110 448 Q480 326 850 448" fill="none" stroke="#fbbf24" stroke-width="38" stroke-linecap="round"/>
  <g fill="#451a03" font-family="Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">
    <text x="480" y="216">TIER A</text>
    <text x="480" y="292">TIER B</text>
    <text x="480" y="374">TIER C</text>
    <text x="480" y="454">TIER D</text>
  </g>
  <rect x="70" y="176" width="54" height="292" rx="10" fill="#334155" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="836" y="176" width="54" height="292" rx="10" fill="#334155" stroke="#cbd5e1" stroke-width="2"/>
  <text x="97" y="330" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" transform="rotate(-90 97 330)">AISLE</text>
  <text x="863" y="330" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" transform="rotate(90 863 330)">AISLE</text>
  <rect x="372" y="480" width="216" height="34" rx="8" fill="#38bdf8"/>
  <text x="480" y="503" fill="#082f49" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">CONTROL DESK</text>
  <rect x="152" y="482" width="100" height="32" rx="8" fill="#ef4444"/>
  <rect x="708" y="482" width="100" height="32" rx="8" fill="#ef4444"/>
  <text x="202" y="504" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">EXIT</text>
  <text x="758" y="504" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">EXIT</text>
